<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sabor do Caldo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tela-inicio" class="tela ativa">
  <h1>🔥 Sabor do Caldo</h1>
  <p>📍 Passos - MG</p>

  <h2>Combos</h2>
  <div class="scroll" id="lista-combos"></div>

  <h2>Caldos</h2>
  <div class="scroll" id="lista-caldos"></div>

  <h2>Bebidas</h2>
  <div class="scroll" id="lista-bebidas"></div>

  <button onclick="abrirCarrinho()">🛒 Carrinho</button>
</div>

<div id="tela-item" class="tela">
  <button onclick="voltar()">⬅</button>

  <h2 id="item-nome"></h2>
  <p id="item-desc"></p>
  <p id="item-preco"></p>

  <div id="adicionais"></div>

  <div class="quantidade">
    <button onclick="diminuir()">-</button>
    <span id="qtd">1</span>
    <button onclick="aumentar()">+</button>
  </div>

  <div class="fixo">
    <button onclick="limparItem()">Limpar</button>
    <button onclick="addCarrinho()">Adicionar</button>
  </div>
</div>

<div id="tela-carrinho" class="tela">
  <h2>🛒 Carrinho</h2>
  <div id="lista-carrinho"></div>
  <h3 id="total"></h3>

  <button onclick="limparCarrinho()">Limpar</button>
  <button onclick="irCheckout()">Pedir</button>
</div>

<div id="tela-checkout" class="tela">
  <h2>Finalizar Pedido</h2>

  <input id="nome" placeholder="Nome"><br>
  <input id="endereco" placeholder="Endereço"><br>
  <input id="telefone" placeholder="Telefone"><br>

  <select id="pagamento">
    <option>Dinheiro</option>
    <option>Pix</option>
    <option>Cartão</option>
  </select><br>

  <input id="troco" placeholder="Troco para"><br>

  <button onclick="enviarPedidoWhatsApp()">Enviar Pedido</button>
</div>

<script src="caldos.js"></script>
<script src="bebidas.js"></script>
<script src="combos.js"></script>
<script src="adicionais-caldo.js"></script>
<script src="app.js"></script>

</body>
</html>
