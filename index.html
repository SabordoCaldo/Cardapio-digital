<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sabor do Caldo</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <img src="jogo.png" class="logo">

  <h1>Sabor do Caldo</h1>
  <p>📍 Passos - MG</p>
</div>


<!-- INICIO -->
<div id="tela-inicio" class="tela ativa"></div>


<!-- CARRINHO -->
<div id="tela-carrinho" class="tela">
  <h2>🛒 Carrinho</h2>
</div>


<!-- PERFIL -->
<div id="tela-perfil" class="tela">

  <h2>Perfil Cliente</h2>

  <div class="box">
    <button onclick="abrirDados()">Dados do cliente</button>
    <button onclick="editarPerfil()">Editar perfil</button>
    <button onclick="sair()">Sair</button>
  </div>

</div>


<!-- DADOS CLIENTE -->
<div id="tela-dados" class="tela">
  <h2>Seus Dados</h2>
  <div id="dados-exibir"></div>
</div>


<!-- CADASTRO / EDIÇÃO -->
<div id="tela-cadastro" class="tela">

  <h2>Cadastro</h2>

  <input id="nome" placeholder="Nome">
  <input id="endereco" placeholder="Endereço">
  <input id="telefone" placeholder="Telefone">

  <button onclick="salvarDados()">Salvar</button>

</div>


<!-- MENU INFERIOR -->
<div class="menu">
  <button onclick="trocarTela('tela-inicio')">🏠<span>Início</span></button>

  <button onclick="trocarTela('tela-carrinho')">🛒<span>Carrinho</span></button>

  <button onclick="trocarTela('tela-perfil')">👤<span>Perfil</span></button>
</div>

<script src="app.js"></script>

</body>
</html>
