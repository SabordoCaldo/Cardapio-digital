<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabor do Caldo</title>

  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<!-- ==========================
INICIO
========================== -->
<div id="inicio" class="tela ativa">
  <div class="topo">
    <div class="logo"></div>
    <h1>Sabor do Caldo</h1>
    <p>Passos - MG</p>
  </div>
</div>

<!-- ==========================
CARRINHO
========================== -->
<div id="carrinho" class="tela">
  <h2>🛒 Carrinho</h2>
</div>

<!-- ==========================
PERFIL
========================== -->
<div id="perfil" class="tela">
  <h2>👤 Perfil</h2>

  <div class="card-perfil">
    <button onclick="abrirDados()">Dados do Cliente</button>
    <button onclick="editarPerfil()">Editar Perfil</button>
    <button onclick="sair()">Sair</button>
  </div>
</div>

<!-- ==========================
DADOS DO CLIENTE
========================== -->
<div id="dados" class="tela">
  <h2>📋 Dados do Cliente</h2>

  <div class="form">
    <input id="nome" placeholder="Nome">
    <input id="endereco" placeholder="Endereço">
    <input id="telefone" placeholder="Telefone">

    <button onclick="salvar()">Salvar</button>
  </div>
</div>

<!-- ==========================
MENU
========================== -->
<div class="menu">

  <button onclick="trocarTela('inicio')">
    🏠
    <span>Início</span>
  </button>

  <button onclick="trocarTela('carrinho')">
    🛒
    <span>Carrinho</span>
  </button>

  <button onclick="trocarTela('perfil')">
    👤
    <span>Perfil</span>
  </button>

</div>

<script src="app.js"></script>

</body>
</html>
