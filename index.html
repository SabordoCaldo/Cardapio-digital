<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabor do Caldo</title>

  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<div id="inicio" class="tela ativa"></div>

<div id="carrinho" class="tela"></div>

<div id="perfil" class="tela">
  <h2>👤 Perfil</h2>

  <div class="card-perfil">
    <button onclick="editarPerfil()">Dados do Cliente</button>
    <button onclick="sair()">Sair</button>
  </div>
</div>

<div id="dados" class="tela">
  <h2>📋 Dados do Cliente</h2>

  <div class="form">
    <input id="nome" placeholder="Nome">
    <input id="endereco" placeholder="Endereço">
    <input id="telefone" placeholder="Telefone">

    <button onclick="salvar()">Salvar</button>
  </div>
</div>

<div class="menu">
  <button onclick="trocarTela('inicio')">🏠<span>Início</span></button>
  <button onclick="trocarTela('carrinho')">🛒<span>Carrinho</span></button>
  <button onclick="trocarTela('perfil')">👤<span>Perfil</span></button>
</div>

<script src="js/produtos.js"></script>
<script src="js/carrinho.js"></script>
<script src="js/pagamento.js"></script>
<script src="js/perfil.js"></script>
<script src="js/app.js"></script>

</body>
</html>
