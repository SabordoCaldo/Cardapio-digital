<!DOCTYPE html>
<html lang="pt-BR">

<!-- ==========================
HEAD
========================== -->
<head>
  <meta charset="UTF-8">
  <title>Sabor do Caldo</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<!-- ==========================
BODY
========================== -->
<body>

<!-- ==========================
TOPO
========================== -->
<div class="topo">
  <h1>🔥 Sabor do Caldo</h1>
  <p>📍 Passos - MG</p>
</div>

<!-- ==========================
CATEGORIAS
========================== -->
<div class="categorias">
  <button onclick="scrollToSection('combos')">Combos</button>
  <button onclick="scrollToSection('caldos')">Caldos</button>
  <button onclick="scrollToSection('bebidas')">Bebidas</button>
</div>

<!-- ==========================
TELA INICIAL
========================== -->
<div id="tela-inicio" class="tela ativa">

  <h2 id="combos">Combos</h2>
  <div class="lista" id="lista-combos"></div>

  <h2 id="caldos">Caldos</h2>
  <div class="lista" id="lista-caldos"></div>

  <h2 id="bebidas">Bebidas</h2>
  <div class="lista" id="lista-bebidas"></div>

</div>

<!-- ==========================
TELA ITEM
========================== -->
<div id="tela-item" class="tela">

  <button onclick="voltar()">⬅ Voltar</button>

  <h2 id="item-nome"></h2>
  <p id="item-desc"></p>
  <p id="item-preco"></p>

  <div id="adicionais"></div>

  <div class="quantidade">
    <button onclick="diminuir()">-</button>
    <span id="qtd">1</span>
    <button onclick="aumentar()">+</button>
  </div>

  <div class="fixo">
    <button onclick="limparItem()">Limpar</button>
    <button onclick="addCarrinho()">Adicionar</button>
  </div>

</div>

<!-- ==========================
TELA CARRINHO
========================== -->
<div id="tela-carrinho" class="tela">

  <h2>🛒 Carrinho</h2>

  <div id="lista-carrinho"></div>

  <h3 id="total"></h3>

  <button onclick="limparCarrinho()">Limpar</button>
  <button onclick="irCheckout()">Pedir</button>

</div>

<!-- ==========================
TELA CHECKOUT
========================== -->
<div id="tela-checkout" class="tela">

  <h2>Finalizar Pedido</h2>

  <input id="nome" placeholder="Nome">
  <input id="endereco" placeholder="Endereço">
  <input id="telefone" placeholder="Telefone">

  <select id="pagamento">
    <option>Dinheiro</option>
    <option>Pix</option>
    <option>Cartão</option>
  </select>

  <input id="troco" placeholder="Troco para">

  <button onclick="enviarPedidoWhatsApp()">Enviar Pedido</button>

</div>

<!-- ==========================
BOTÃO CARRINHO
========================== -->
<button id="btn-carrinho" onclick="abrirCarrinho()">🛒</button>

<!-- ==========================
SCRIPTS
========================== -->
<script src="caldos.js"></script>
<script src="bebidas.js"></script>
<script src="combos.js"></script>
<script src="adicionais-caldo.js"></script>
<script src="app.js"></script>

</body>
</html>
