<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sabor do Caldo</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<!-- ==========================
     TOPO
========================== -->
<div class="topo">
  <h1>🔥 Sabor do Caldo</h1>
  <p>📍 Passos - MG</p>
</div>

<!-- ==========================
     INICIO
========================== -->
<div id="tela-inicio" class="tela ativa">

  <h2>Combos</h2>
  <div class="lista" id="lista-combos"></div>

  <h2>Caldos</h2>
  <div class="lista" id="lista-caldos"></div>

  <h2>Bebidas</h2>
  <div class="lista" id="lista-bebidas"></div>

</div>

<!-- ==========================
     ITEM
========================== -->
<div id="tela-item" class="tela">

  <button onclick="voltar()">⬅ Voltar</button>

  <h2 id="item-nome"></h2>
  <p id="item-desc"></p>
  <p id="item-preco"></p>

  <div id="adicionais"></div>

  <div class="quantidade">
    <button onclick="diminuir()">-</button>
    <span id="qtd">1</span>
    <button onclick="aumentar()">+</button>
  </div>

  <div class="fixo">
    <button onclick="limparItem()">Limpar</button>
    <button onclick="addCarrinho()">Adicionar</button>
  </div>

</div>

<!-- ==========================
     CARRINHO
========================== -->
<div id="tela-carrinho" class="tela">
  <h2>🛒 Carrinho</h2>
  <div id="lista-carrinho"></div>
  <h3 id="total"></h3>

  <button onclick="limparCarrinho()">Limpar</button>
  <button onclick="irCheckout()">Pedir</button>
</div>

<!-- ==========================
     PERFIL
========================== -->
<div id="tela-perfil" class="tela">
  <h2>Seus Dados</h2>

  <input id="nome" placeholder="Nome">
  <input id="endereco" placeholder="Endereço">
  <input id="telefone" placeholder="Telefone">
</div>

<!-- ==========================
     SACOLA
========================== -->
<div id="sacola" class="sacola" onclick="abrirCarrinho()" style="display:none;">
  <span>Ver sacola</span>
  <span id="total-sacola">R$ 0,00</span>
</div>

<!-- ==========================
     MENU
========================== -->
<div class="menu">
  <button onclick="trocarTela('tela-inicio')">🏠<span>Início</span></button>

  <button onclick="abrirCarrinho()" style="position:relative;">
    🛒<span>Carrinho</span>
    <span id="badge" class="badge">0</span>
  </button>

  <button onclick="trocarTela('tela-perfil')">👤<span>Perfil</span></button>
</div>

<script src="caldos.js"></script>
<script src="bebidas.js"></script>
<script src="combos.js"></script>
<script src="adicionais-caldo.js"></script>
<script src="app.js"></script>

</body>
</html>
