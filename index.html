<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabor do Caldo</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="stylesheet" href="css/componentes.css">
</head>

<body>

<div id="inicio" class="tela ativa">
  <div class="topo">
    <div class="logo"></div>
    <h1>Sabor do Caldo</h1>
    <p>Caldos quentes preparados na hora</p>
  </div>

  <div id="combos"></div>
  <div id="caldos"></div>
  <div id="bebidas"></div>
</div>

<div id="produto" class="tela">
  <button class="btn-topo" onclick="trocarTela('inicio')">←</button>
  <div id="produto-detalhe"></div>
</div>

<div id="carrinho" class="tela"></div>

<div id="perfil" class="tela">
  <button class="btn-topo" onclick="trocarTela('inicio')">←</button>
  <h2>Minha Conta</h2>
  <div class="card-perfil">
    <button onclick="editarPerfil()">Dados do Cliente</button>
    <button onclick="mostrarHistorico()">Histórico de pedidos</button>
  </div>
  <div id="historico"></div>
</div>

<div id="dados" class="tela">
  <button class="btn-topo" onclick="trocarTela('perfil')">←</button>
  <h2>Dados do Cliente</h2>

  <div class="form">
    <input id="nome" placeholder="Nome">
    <input id="endereco" placeholder="Endereço">
    <input id="telefone" placeholder="Telefone">

    <button class="btn btn-success" onclick="salvar()">Salvar</button>
    <button class="btn btn-danger" onclick="sair()">Limpar dados</button>
  </div>
</div>

<div class="menu">
  <button onclick="trocarTela('inicio')">🏠</button>
  <button onclick="trocarTela('carrinho')">🛒</button>
  <button onclick="trocarTela('perfil')">👤</button>
</div>

<script src="js/carrinho.js"></script>
<script src="js/pagamento.js"></script>

<script src="js/perfil/dados.js"></script>
<script src="js/perfil/historico.js"></script>
<script src="js/perfil/limpar.js"></script>

<script src="js/itens/combos.js"></script>
<script src="js/itens/caldos.js"></script>
<script src="js/itens/bebidas.js"></script>

<script src="js/app.js"></script>

</body>
</html>
