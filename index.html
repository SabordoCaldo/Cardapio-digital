<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabor do Caldo</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="stylesheet" href="css/componentes.css">
</head>

<body>

<!-- ==========================
INÍCIO
========================== -->
<div id="inicio" class="tela ativa">

  <div class="topo">
    <div class="logo"></div>
    <h1>Sabor do Caldo</h1>
    <p>Caldos quentes preparados na hora</p>
  </div>

  <!-- COMBOS -->
  <div id="combos"></div>

  <!-- CALDOS -->
  <div id="caldos"></div>

  <!-- BEBIDAS -->
  <div id="bebidas"></div>

</div>

<!-- ==========================
CARRINHO
========================== -->
<div id="carrinho" class="tela"></div>

<!-- ==========================
MINHA CONTA
========================== -->
<div id="perfil" class="tela">

  <button class="btn-topo" onclick="trocarTela('inicio')">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M15 18L9 12L15 6" stroke-width="2"/>
    </svg>
  </button>

  <h2>Minha Conta</h2>

  <div class="card-perfil">
    <button onclick="editarPerfil()">Dados do Cliente</button>
    <button onclick="mostrarHistorico()">Histórico de pedidos</button>
  </div>

  <div id="historico" style="margin-top:20px;"></div>

</div>

<!-- ==========================
DADOS DO CLIENTE
========================== -->
<div id="dados" class="tela">

  <button class="btn-topo" onclick="trocarTela('perfil')">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M15 18L9 12L15 6" stroke-width="2"/>
    </svg>
  </button>

  <h2>Dados do Cliente</h2>

  <div class="form">
    <input id="nome" placeholder="Nome">
    <input id="endereco" placeholder="Endereço">
    <input id="telefone" placeholder="Telefone">

    <button class="btn btn-success" onclick="salvar()">Salvar</button>
    <button class="btn btn-danger" onclick="sair()">Limpar dados</button>
  </div>

</div>

<!-- ==========================
MENU
========================== -->
<div class="menu">

  <button onclick="trocarTela('inicio')">
    🏠
    <span>Início</span>
  </button>

  <button onclick="trocarTela('carrinho')">
    🛒
    <span>Carrinho</span>
  </button>

  <button onclick="trocarTela('perfil')">
    👤
    <span>Conta</span>
  </button>

</div>

<!-- ==========================
SCRIPTS
========================== -->

<script src="js/carrinho.js"></script>
<script src="js/pagamento.js"></script>

<script src="js/perfil/dados.js"></script>
<script src="js/perfil/historico.js"></script>
<script src="js/perfil/limpar.js"></script>

<!-- ITENS -->
<script src="js/itens/combos.js"></script>
<script src="js/itens/caldos.js"></script>
<script src="js/itens/adicionais-caldo.js"></script>
<script src="js/itens/bebidas.js"></script>

<script src="js/app.js"></script>

</body>
</html>
